<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMBER VANGUARD</title>
  <style>
    /* ── 全局重置 & 字体 ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0a;
      --bg-panel:    #0f0f0f;
      --bg-card:     #141414;
      --border:      #1e1e1e;
      --green:       #3ddc84;
      --green-dim:   #1a5e38;
      --green-glow:  rgba(61,220,132,.18);
      --red:         #c0392b;
      --red-dim:     #5a1a14;
      --red-glow:    rgba(192,57,43,.2);
      --amber:       #e67e22;
      --amber-dim:   #6b3a10;
      --muted:       #3a3a3a;
      --text:        #b0c4ae;
      --text-dim:    #4a5e4a;
      --text-bright: #e8f5e8;
      --font:        'Courier New', 'Consolas', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.07) 2px,
        rgba(0,0,0,.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── 布局主框架 ──────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 14px;
      gap: 8px;
    }

    /* ── 顶部标题条 ──────────────────────────────────── */
    #title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: .12em;
      flex-shrink: 0;
    }
    #title-bar .logo {
      color: var(--green);
      font-size: 13px;
      letter-spacing: .25em;
      text-shadow: 0 0 8px var(--green);
    }

    /* ── HUD 状态栏 ──────────────────────────────────── */
    #hud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      min-width: 90px;
    }
    .hud-label {
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--text-dim);
      margin-bottom: 3px;
    }
    .hud-value {
      font-size: 13px;
      font-weight: bold;
      color: var(--text-bright);
    }

    /* 进度条 */
    .bar-wrap {
      height: 5px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s ease;
    }
    .bar-hp   { background: var(--green);  box-shadow: 0 0 5px var(--green); }
    .bar-san  { background: #5b8dd9;       box-shadow: 0 0 5px #5b8dd9; }
    .bar-curse{ background: var(--amber);  box-shadow: 0 0 5px var(--amber); }

    .hud-name {
      font-size: 15px;
      color: var(--green);
      text-shadow: 0 0 6px var(--green-glow);
    }
    .hud-inventory {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
      align-items: flex-start;
      min-width: 180px;
    }
    .item-tag {
      background: var(--bg-card);
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 2px;
      letter-spacing: .05em;
    }
    .item-tag.cursed {
      border-color: var(--red-dim);
      color: var(--red);
    }

    /* ── 主体区（房间信息 + 叙事） ───────────────────── */
    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    #room-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #room-name {
      font-size: 16px;
      color: var(--amber);
      letter-spacing: .1em;
      text-shadow: 0 0 8px rgba(230,126,34,.3);
    }
    #room-desc {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 3px;
      line-height: 1.5;
    }

    #narration-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      scroll-behavior: smooth;
    }
    #narration-scroll::-webkit-scrollbar { width: 4px; }
    #narration-scroll::-webkit-scrollbar-thumb {
      background: var(--green-dim);
      border-radius: 2px;
    }

    #narration-text {
      color: var(--text);
      font-size: 13.5px;
      line-height: 1.8;
      white-space: pre-wrap;
      min-height: 60px;
    }

    /* 光标闪烁 */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--green);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* 行动结果横幅 */
    #action-banner {
      display: none;
      margin: 8px 14px 0;
      padding: 6px 10px;
      border-left: 3px solid var(--green);
      background: rgba(61,220,132,.05);
      font-size: 12px;
      color: var(--green);
    }
    #action-banner.fail {
      border-color: var(--red);
      background: rgba(192,57,43,.07);
      color: var(--red);
    }

    /* ── 底部操作区 ──────────────────────────────────── */
    #bottom-area {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    /* 行动选项 */
    #actions-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .panel-label {
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .action-btn {
      background: var(--bg-card);
      border: 1px solid var(--green-dim);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 10px;
      text-align: left;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color .15s, background .15s, color .15s;
      line-height: 1.4;
    }
    .action-btn:hover:not(:disabled) {
      border-color: var(--green);
      background: var(--green-glow);
      color: var(--text-bright);
    }
    .action-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }
    .action-btn .btn-idx {
      color: var(--green-dim);
      font-size: 10px;
      margin-right: 6px;
    }

    /* 方向键盘 */
    #dpad-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 150px;
    }
    .dpad-row {
      display: flex;
      gap: 4px;
    }
    .dpad-btn {
      width: 44px;
      height: 40px;
      background: var(--bg-card);
      border: 1px solid var(--muted);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, background .15s, color .15s;
      gap: 1px;
    }
    .dpad-btn .dpad-arrow { font-size: 14px; line-height: 1; }
    .dpad-btn .dpad-key   { font-size: 9px;  color: inherit; }
    .dpad-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
      text-shadow: 0 0 6px var(--green);
    }
    .dpad-btn:disabled, .dpad-btn.disabled {
      opacity: .25;
      cursor: not-allowed;
    }

    /* ── 加载遮罩 ────────────────────────────────────── */
    #loading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--green-dim);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: var(--green);
      font-size: 12px;
      letter-spacing: .2em;
    }

    /* ── Game Over 遮罩 ──────────────────────────────── */
    #gameover-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.9);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 22px;
    }
    #gameover-overlay.show { display: flex; }
    #gameover-title {
      font-size: 36px;
      letter-spacing: .3em;
      color: var(--red);
      text-shadow: 0 0 30px var(--red), 0 0 60px rgba(192,57,43,.4);
      animation: flicker 3s infinite;
    }
    @keyframes flicker {
      0%,100% { opacity: 1; }
      93%      { opacity: 1; }
      94%      { opacity: .4; }
      96%      { opacity: 1; }
      98%      { opacity: .6; }
    }
    #gameover-reason {
      color: var(--text-dim);
      font-size: 13px;
      letter-spacing: .1em;
      text-align: center;
      max-width: 420px;
      line-height: 1.8;
    }
    #restart-btn {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: var(--font);
      font-size: 13px;
      padding: 10px 30px;
      cursor: pointer;
      letter-spacing: .15em;
      transition: background .2s;
    }
    #restart-btn:hover { background: var(--red-glow); }

    /* ── 开始界面 ────────────────────────────────────── */
    #start-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    #start-overlay.hidden { display: none; }
    .start-logo {
      font-size: 28px;
      letter-spacing: .4em;
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-glow);
      animation: flicker 4s infinite;
    }
    .start-tagline {
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: .2em;
    }
    .start-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 280px;
    }
    .start-form label {
      font-size: 10px;
      letter-spacing: .15em;
      color: var(--text-dim);
      margin-bottom: 3px;
      display: block;
    }
    .start-form input,
    .start-form select {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--green-dim);
      color: var(--text-bright);
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 2px;
      outline: none;
    }
    .start-form input:focus,
    .start-form select:focus { border-color: var(--green); }
    .start-form select option { background: var(--bg-card); }
    #begin-btn {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font);
      font-size: 13px;
      padding: 10px;
      cursor: pointer;
      letter-spacing: .2em;
      transition: background .2s, box-shadow .2s;
      margin-top: 6px;
    }
    #begin-btn:hover {
      background: var(--green-glow);
      box-shadow: 0 0 12px var(--green-glow);
    }

    /* ── 滚动消息日志（小型） ────────────────────────── */
    #log-bar {
      flex-shrink: 0;
      height: 18px;
      overflow: hidden;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: .04em;
      padding: 0 6px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     开始界面
════════════════════════════════════════════════ -->
<div id="start-overlay">
  <div class="start-logo">EMBER VANGUARD</div>
  <div class="start-tagline">/// 黑暗中，唯余余烬 ///</div>
  <div class="start-form">
    <div>
      <label for="inp-name">调查者姓名</label>
      <input id="inp-name" type="text" maxlength="20" placeholder="输入姓名…" value="调查者" />
    </div>
    <div>
      <label for="inp-bg">背景职业</label>
      <select id="inp-bg">
        <option value="journalist">记者</option>
        <option value="detective">侦探</option>
        <option value="occultist">秘术师</option>
        <option value="soldier">士兵</option>
        <option value="doctor">医生</option>
      </select>
    </div>
    <button id="begin-btn">[ 开始调查 ]</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     主界面
════════════════════════════════════════════════ -->
<div id="app">

  <!-- 顶部标题条 -->
  <div id="title-bar">
    <span class="logo">EMBER VANGUARD</span>
    <span id="title-info">调查者: — &nbsp;|&nbsp; 位置: —</span>
  </div>

  <!-- HUD 状态栏 -->
  <div id="hud">
    <div class="hud-block" style="min-width:120px">
      <div class="hud-label">调查者</div>
      <div class="hud-name" id="hud-name">—</div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:2px" id="hud-bg">—</div>
    </div>

    <div class="hud-block" style="min-width:100px">
      <div class="hud-label">体力 HP</div>
      <div class="hud-value" id="hud-hp">—</div>
      <div class="bar-wrap"><div class="bar-fill bar-hp" id="bar-hp" style="width:100%"></div></div>
    </div>

    <div class="hud-block" style="min-width:100px">
      <div class="hud-label">理智 SAN</div>
      <div class="hud-value" id="hud-san">—</div>
      <div class="bar-wrap"><div class="bar-fill bar-san" id="bar-san" style="width:100%"></div></div>
    </div>

    <div class="hud-block" style="min-width:100px">
      <div class="hud-label">诅咒 CURSE</div>
      <div class="hud-value" id="hud-curse">—</div>
      <div class="bar-wrap"><div class="bar-fill bar-curse" id="bar-curse" style="width:0%"></div></div>
    </div>

    <div class="hud-block hud-inventory">
      <div class="hud-label">物品栏</div>
      <div id="hud-items" style="display:flex;flex-wrap:wrap;gap:4px;align-items:center">
        <span style="color:var(--text-dim);font-size:11px">— 空 —</span>
      </div>
    </div>
  </div>

  <!-- 主体区 -->
  <div id="main-area">
    <div id="room-header">
      <div id="room-name">—</div>
      <div id="room-desc"></div>
    </div>
    <div id="action-banner"></div>
    <div id="narration-scroll">
      <div id="narration-text"><span class="cursor"></span></div>
    </div>
  </div>

  <!-- 底部操作区 -->
  <div id="bottom-area">
    <div id="actions-panel">
      <div class="panel-label">// 行动选项</div>
      <div id="action-btns"></div>
    </div>

    <div id="dpad-panel">
      <div class="panel-label" style="align-self:flex-start">// 移动</div>
      <div class="dpad-row">
        <div style="width:44px"></div>
        <button class="dpad-btn disabled" id="dpad-w" data-key="w" disabled>
          <span class="dpad-arrow">▲</span>
          <span class="dpad-key">W</span>
        </button>
        <div style="width:44px"></div>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn disabled" id="dpad-a" data-key="a" disabled>
          <span class="dpad-arrow">◀</span>
          <span class="dpad-key">A</span>
        </button>
        <button class="dpad-btn disabled" id="dpad-s" data-key="s" disabled>
          <span class="dpad-arrow">▼</span>
          <span class="dpad-key">S</span>
        </button>
        <button class="dpad-btn disabled" id="dpad-d" data-key="d" disabled>
          <span class="dpad-arrow">▶</span>
          <span class="dpad-key">D</span>
        </button>
      </div>
    </div>
  </div>

  <div id="log-bar"></div>
</div>

<!-- 加载遮罩 -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">PROCESSING...</div>
</div>

<!-- Game Over 遮罩 -->
<div id="gameover-overlay">
  <div id="gameover-title">GAME OVER</div>
  <div id="gameover-reason"></div>
  <button id="restart-btn">[ 重新开始 ]</button>
</div>

<script>
  'use strict';

  // ── 配置 ────────────────────────────────────────────
  const API = 'http://localhost:8000/api';
  const TYPEWRITER_SPEED = 18; // ms/字符

  // ── 状态 ────────────────────────────────────────────
  let _typing = null;   // typewriter timer
  let _busy   = false;  // 防止并发请求

  // ── DOM 引用 ─────────────────────────────────────────
  const $ = id => document.getElementById(id);

  const els = {
    startOverlay:    $('start-overlay'),
    inpName:         $('inp-name'),
    inpBg:           $('inp-bg'),
    beginBtn:        $('begin-btn'),

    titleInfo:       $('title-info'),
    hudName:         $('hud-name'),
    hudBg:           $('hud-bg'),
    hudHp:           $('hud-hp'),
    hudSan:          $('hud-san'),
    hudCurse:        $('hud-curse'),
    barHp:           $('bar-hp'),
    barSan:          $('bar-san'),
    barCurse:        $('bar-curse'),
    hudItems:        $('hud-items'),

    roomName:        $('room-name'),
    roomDesc:        $('room-desc'),
    actionBanner:    $('action-banner'),
    narrationScroll: $('narration-scroll'),
    narrationText:   $('narration-text'),

    actionBtns:      $('action-btns'),
    dpadW:           $('dpad-w'),
    dpadA:           $('dpad-a'),
    dpadS:           $('dpad-s'),
    dpadD:           $('dpad-d'),

    loadingOverlay:  $('loading-overlay'),
    gameoverOverlay: $('gameover-overlay'),
    gameoverTitle:   $('gameover-title'),
    gameoverReason:  $('gameover-reason'),
    restartBtn:      $('restart-btn'),

    logBar:          $('log-bar'),
  };

  // ── 工具函数 ─────────────────────────────────────────

  function setLoading(on) {
    els.loadingOverlay.classList.toggle('show', on);
    _busy = on;
  }

  function log(msg) {
    els.logBar.textContent = '> ' + msg;
  }

  /** 打字机效果 */
  function typewrite(text, onDone) {
    if (_typing) clearTimeout(_typing);
    els.narrationText.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';

    function tick() {
      if (i < text.length) {
        els.narrationText.textContent = text.slice(0, ++i);
        els.narrationText.appendChild(cursor);
        els.narrationScroll.scrollTop = els.narrationScroll.scrollHeight;
        _typing = setTimeout(tick, TYPEWRITER_SPEED);
      } else {
        els.narrationText.appendChild(cursor);
        if (onDone) onDone();
      }
    }
    tick();
  }

  /** 立即显示全文（无动画，用于非关键更新） */
  function setNarration(text, animate = true) {
    if (animate) {
      typewrite(text);
    } else {
      if (_typing) clearTimeout(_typing);
      els.narrationText.textContent = text;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      els.narrationText.appendChild(cursor);
    }
  }

  // ── 渲染函数 ─────────────────────────────────────────

  function renderHUD(player) {
    const maxHp    = player.max_hp    ?? 20;
    const maxSan   = player.max_san   ?? 20;
    const maxCurse = player.max_curse ?? 10;

    els.hudName.textContent  = player.name  ?? '—';
    els.hudBg.textContent    = player.background_label ?? player.background ?? '—';
    els.hudHp.textContent    = `${player.hp} / ${maxHp}`;
    els.hudSan.textContent   = `${player.san} / ${maxSan}`;
    els.hudCurse.textContent = `${player.curse_level ?? 0} / ${maxCurse}`;

    els.barHp.style.width    = `${Math.max(0, (player.hp / maxHp) * 100)}%`;
    els.barSan.style.width   = `${Math.max(0, (player.san / maxSan) * 100)}%`;
    els.barCurse.style.width = `${Math.min(100, ((player.curse_level ?? 0) / maxCurse) * 100)}%`;

    // 低血量变红
    els.barHp.style.background  = player.hp / maxHp < .3 ? 'var(--red)' : '';
    els.barSan.style.background = player.san / maxSan < .3 ? 'var(--amber)' : '';

    // 物品栏
    const inv = player.inventory ?? [];
    if (inv.length === 0) {
      els.hudItems.innerHTML = '<span style="color:var(--text-dim);font-size:11px">— 空 —</span>';
    } else {
      els.hudItems.innerHTML = inv.map(item => {
        const name    = typeof item === 'string' ? item : (item.name ?? JSON.stringify(item));
        const cursed  = typeof item === 'object' && item.cursed;
        return `<span class="item-tag${cursed ? ' cursed' : ''}">${name}</span>`;
      }).join('');
    }

    els.titleInfo.textContent = `调查者: ${player.name} | 位置: ${player.current_room_id ?? '—'}`;
  }

  function renderRoom(room) {
    els.roomName.textContent = room.name ?? '—';
    els.roomDesc.textContent = room.description ?? '';
  }

  /** 渲染行动按钮和方向键 */
  function renderOptions(options, disabled = false) {
    const actionOpts = options.filter(o => o.type === 'action');
    const moveOpts   = options.filter(o => o.type === 'move');

    // ── 行动按钮 ────────────────────────────────────
    els.actionBtns.innerHTML = '';
    if (actionOpts.length === 0) {
      els.actionBtns.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:4px 2px">（当前无行动选项）</div>';
    } else {
      actionOpts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'action-btn';
        btn.disabled  = disabled;
        btn.innerHTML = `<span class="btn-idx">[${opt.index}]</span>${escHtml(opt.text)}`;
        btn.addEventListener('click', () => doAction(opt.index));
        els.actionBtns.appendChild(btn);
      });
    }

    // ── 方向键 ──────────────────────────────────────
    const keyMap = { w: els.dpadW, a: els.dpadA, s: els.dpadS, d: els.dpadD };

    // 先全部禁用
    Object.values(keyMap).forEach(btn => {
      btn.disabled = true;
      btn.classList.remove('active');
      btn.classList.add('disabled');
    });

    moveOpts.forEach(opt => {
      const key = opt.key?.toLowerCase();
      const btn = keyMap[key];
      if (!btn) return;
      btn.disabled = disabled;
      btn.classList.toggle('disabled', disabled);
      if (!disabled) {
        btn.classList.add('active');
        // 悬停提示
        btn.title = opt.text;
        // 点击绑定
        const newBtn = btn.cloneNode(true); // 移除旧监听
        btn.parentNode.replaceChild(newBtn, btn);
        keyMap[key] = newBtn;
        newBtn.disabled = false;
        newBtn.classList.remove('disabled');
        newBtn.classList.add('active');
        newBtn.addEventListener('click', () => doMove(key));
      }
    });
  }

  /** 渲染完整快照 */
  function renderState(state, animate = true) {
    renderHUD(state.player);
    renderRoom(state.room);
    setNarration(state.narration ?? '', animate);
    renderOptions(state.options ?? []);

    // Game Over 检测
    const go = state.game_over;
    if (go && (go.dead || go.insane)) {
      showGameOver(go);
    }
  }

  function showActionBanner(result) {
    const { roll_result, roll_success, hp_delta, san_delta } = result;
    const rollStr  = `D20: ${roll_result}`;
    const outcome  = roll_success ? '[ 成功 ]' : '[ 失败 ]';
    const hpStr    = hp_delta  ? `HP ${hp_delta > 0 ? '+' : ''}${hp_delta}` : '';
    const sanStr   = san_delta ? `SAN ${san_delta > 0 ? '+' : ''}${san_delta}` : '';
    const parts    = [rollStr, outcome, hpStr, sanStr].filter(Boolean);
    els.actionBanner.textContent = parts.join('  ·  ');
    els.actionBanner.className   = roll_success ? '' : 'fail';
    els.actionBanner.style.display = 'block';
    // 3秒后自动淡出
    setTimeout(() => { els.actionBanner.style.display = 'none'; }, 3500);
  }

  function showGameOver(go) {
    const reason = go.dead
      ? '你的伤势已无法承受。\n黑暗从四面八方涌来，意识渐渐消散。'
      : '你的理智彻底崩溃。\n那些无法言说之物最终将你吞噬。';
    els.gameoverReason.textContent = reason;
    els.gameoverOverlay.classList.add('show');
    renderOptions([], true); // 禁用所有按钮
  }

  // ── API 调用 ─────────────────────────────────────────

  async function apiPost(endpoint, body = {}) {
    const res = await fetch(`${API}${endpoint}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail ?? '请求失败');
    }
    return res.json();
  }

  async function doStart(name, background) {
    setLoading(true);
    log('正在初始化游戏…');
    try {
      const state = await apiPost('/start', { name, background });
      renderState(state, true);
      log('游戏已开始');
    } catch (e) {
      log('错误: ' + e.message);
      alert('无法连接到服务器，请确认后端已启动（python server.py）');
    } finally {
      setLoading(false);
    }
  }

  async function doAction(actionIndex) {
    if (_busy) return;
    setLoading(true);
    log(`执行行动 [${actionIndex}]…`);
    renderOptions([], true);
    try {
      const state = await apiPost('/action', { action_index: actionIndex });
      if (state.action_result) showActionBanner(state.action_result);
      renderState(state, true);
      log('行动完成');
    } catch (e) {
      log('错误: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  async function doMove(directionKey) {
    if (_busy) return;
    setLoading(true);
    log(`移动方向 [${directionKey.toUpperCase()}]…`);
    renderOptions([], true);
    try {
      const state = await apiPost('/move', { direction_key: directionKey });
      els.actionBanner.style.display = 'none';
      renderState(state, true);
      log(`进入「${state.room.name}」`);
    } catch (e) {
      log('错误: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  // ── 键盘快捷键 ───────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (els.startOverlay && !els.startOverlay.classList.contains('hidden')) return;
    if (els.gameoverOverlay.classList.contains('show')) return;
    const key = e.key.toLowerCase();
    if (['w','a','s','d'].includes(key)) {
      e.preventDefault();
      // 仅当对应方向可用时触发
      const dpadBtn = $(`dpad-${key}`);
      if (dpadBtn && !dpadBtn.disabled && dpadBtn.classList.contains('active')) {
        doMove(key);
      }
    }
    // 数字键 1-9 触发行动
    const num = parseInt(key);
    if (!isNaN(num) && num >= 1 && num <= 9) {
      const btns = els.actionBtns.querySelectorAll('.action-btn:not(:disabled)');
      if (btns[num - 1]) btns[num - 1].click();
    }
  });

  // ── 事件绑定 ─────────────────────────────────────────

  els.beginBtn.addEventListener('click', () => {
    const name = els.inpName.value.trim() || '调查者';
    const bg   = els.inpBg.value;
    els.startOverlay.classList.add('hidden');
    doStart(name, bg);
  });

  els.inpName.addEventListener('keydown', e => {
    if (e.key === 'Enter') els.beginBtn.click();
  });

  els.restartBtn.addEventListener('click', () => {
    els.gameoverOverlay.classList.remove('show');
    els.startOverlay.classList.remove('hidden');
    els.actionBanner.style.display = 'none';
  });

  // ── 工具 ─────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
